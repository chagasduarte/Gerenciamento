<div class="timeline-container">
    <div class="section-header">
        <h3>Calendário de Parcelamentos</h3>
        <p>Acompanhe a duração e o término de suas dívidas parceladas.</p>
    </div>

    <div class="timeline-content" *ngIf="!loading">
        <div class="timeline-grid">
            <!-- Headers -->
            <div class="grid-header desc-header">Descrição</div>
            <div class="grid-header month-header" *ngFor="let m of meses; let i = index" [style.grid-column]="i + 2">
                {{m}}</div>

            <div class="grid-separator"></div>

            <!-- Items -->
            <ng-container *ngFor="let item of items; let i = index">
                <!-- Linha horizontal separadora -->
                <div class="grid-row-line" [style.grid-row]="i + 3"></div>

                <!-- Descrição da dívida (Coluna 1) -->
                <div class="timeline-desc" [style.grid-row]="i + 3">
                    <span class="desc-text">{{item.descricao}}</span>
                    <span class="parcelas-badge">{{item.total_parcelas}}x</span>
                </div>

                <!-- Barras de duração (Meses exatos) -->
                <ng-container *ngFor="let mes of meses; let idx = index">
                    <div class="timeline-bar-wrapper" [style.grid-row]="i + 3" [style.grid-column]="idx + 2">
                        <ng-container *ngFor="let parcela of getParcelasDoMes(item, idx + 1)">
                            <div *ngIf="isMesAtivo(item, idx + 1)" class="timeline-bar" [class.paid]="parcela.pago"
                                [title]="item.descricao + ' - Parcela: ' + (parcela.pago ? 'PAGO' : 'PENDENTE')">

                                <!-- Iteramos sobre a lista de objetos (parcelas) deste mês -->
                                <div class="bar-shine">

                                    {{ parcela.valor | currency: 'BRL' }}

                                </div>

                            </div>
                        </ng-container>
                    </div>
                </ng-container>
            </ng-container>

            <!-- Linhas de grade verticais para guiar a leitura -->
            <div class="grid-line" *ngFor="let m of meses; let i = index" [style.grid-column]="i + 2"
                [style.grid-row]="'1 / span ' + (items.length + 2)">
            </div>
        </div>

        <div class="empty-state" *ngIf="items.length === 0">
            Nenhuma dívida parcelada ativa para este ano.
        </div>
    </div>

    <div class="loading-state" *ngIf="loading">
        <div class="spinner"></div>
        <span>Carregando cronograma...</span>
    </div>
</div>

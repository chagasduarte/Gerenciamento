<div class="pagina">
  <app-side-bar class="side-bar"></app-side-bar>
  <app-nav-bar></app-nav-bar>

  <div class="router-outlet">
    <ng-container *ngIf="resumoMensal$ | async as resumo">
      <div class="data">
        <div class="d-flex" style="font-weight: 900 !important; font-size: 42px;">
          {{systemService.mes.nome}} | {{systemService.ano.valor}}
        </div>
      </div>

      <div *ngIf="alertaSalario$ | async" class="alert alert-warning d-flex align-items-center mb-3 mx-4" role="alert">
        <i class="bi bi-exclamation-triangle-fill flex-shrink-0 me-2" style="font-size: 24px;"></i>
        <div>
          <strong>Atenção!</strong> Seus gastos já comprometeram mais de 80% da sua receita deste mês.
        </div>
      </div>

      <div class="cards_resumo">
        <app-cards class="gastos" titulo="Gastos" [valor]="resumo.gastos_mensal_pendente"
          [valorTotal]="resumo.gastos_mensal" tipo="saida">
        </app-cards>
        <app-resumo class="resumo" from="home" [fontSize]=15></app-resumo>
        <app-cards class="receitas" titulo="Receitas" [valor]="resumo.receita_mensal_pendente"
          [valorTotal]="resumo.receita_mensal" tipo="entrada">
        </app-cards>

        <app-cards class="saldo" titulo="Saldo Atual" [valor]="resumo.saldo_atual" tipo="saldo">
        </app-cards>
      </div>
    </ng-container>
    <router-outlet></router-outlet>
  </div>
</div>
